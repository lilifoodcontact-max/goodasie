<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Good'Asie — Gestion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F1;
    --paper: #FFFFFF;
    --ink: #241F1A;
    --muted: #8C8272;
    --line: #E4DCC9;
    --teal: #2A5C6B;
    --teal-dim: #E3EBEC;
    --amber: #B8632E;
    --amber-dim: #F7EAE0;
    --red: #A8383A;
    --red-dim: #F5E5E1;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(36,31,26,0.06), 0 8px 24px -12px rgba(36,31,26,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  #app { max-width:600px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 18px 6px; }
  .brand { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; letter-spacing:-0.01em; }
  .brand .sub { display:block; font-family:'Inter',sans-serif; font-weight:500; font-size:11px; color:var(--muted); letter-spacing:0.02em; margin-top:1px; }
  .icon-btn { width:36px; height:36px; border-radius:10px; border:1px solid var(--line); background:var(--paper); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink); }
  .icon-btn:hover { background:var(--teal-dim); }
  .icon-btn:focus-visible { outline:2px solid var(--teal); outline-offset:2px; }

  main { flex:1; padding:6px 16px 100px; }

  h1.page-title { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; margin:10px 2px 14px; display:flex; align-items:center; gap:8px; }
  .crumb { display:flex; align-items:center; gap:8px; margin:10px 2px 14px; }
  .crumb button { background:none; border:none; color:var(--teal); font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px; cursor:pointer; padding:4px 0; display:flex; align-items:center; gap:4px; }
  .crumb .sep { color:var(--muted); }
  .crumb .current { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }

  .section-title { font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:700; margin:22px 2px 9px; display:flex; align-items:center; gap:7px; color:var(--ink); }
  .section-title .swatch { width:8px; height:8px; border-radius:2px; }

  .card { background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
  .field-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--line); gap:10px; }
  .field-row:last-child { border-bottom:none; }
  .field-label { font-size:13.5px; }
  .field-input { width:96px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13.5px; border:1px solid var(--line); border-radius:8px; padding:7px 8px; background:#FCFAF5; color:var(--ink); }
  .field-input:focus-visible { outline:2px solid var(--teal); background:#fff; }
  .field-suffix { font-size:11.5px; color:var(--muted); width:14px; }
  .field-input-wrap { display:flex; align-items:center; gap:4px; }

  .acc-row { align-items:center; }
  .field-label-wrap { display:flex; flex-direction:column; gap:1px; }
  .field-current { font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
  .field-current.has-val { color:var(--teal); font-weight:600; }
  .field-current.fixable { cursor:pointer; }
  .field-current.fixable:hover { text-decoration:underline; }
  .fix-edit-wrap { display:flex; align-items:center; gap:6px; }
  .fix-edit-input { width:80px; font-family:'IBM Plex Mono',monospace; font-size:12px; border:1px solid var(--teal); border-radius:6px; padding:3px 6px; background:#fff; }
  .fix-edit-btn { background:var(--teal); color:#fff; border:none; border-radius:6px; padding:3px 8px; font-size:11px; font-weight:600; cursor:pointer; }
  .fix-cancel-btn { background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer; padding:3px 4px; }
  .acc-input { width:88px; }
  .acc-add-btn { width:32px; height:32px; border-radius:8px; border:none; background:var(--teal); color:#fff; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; flex-shrink:0; }
  .acc-add-btn:hover { background:#1f4650; }
  .acc-add-btn:active { transform:scale(0.94); }
  .acc-flash { position:absolute; right:14px; top:-2px; font-size:11px; color:var(--teal); font-weight:600; opacity:0; transition:opacity 0.2s ease; pointer-events:none; }
  .acc-flash.show { opacity:1; }
  .auto-save-note { text-align:center; font-size:11.5px; color:var(--muted); margin-top:16px; display:flex; align-items:center; justify-content:center; gap:6px; }
  .auto-save-note .dot { width:6px; height:6px; border-radius:50%; background:var(--teal); }

  .tap-card { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--line); cursor:pointer; }
  .tap-card:last-child { border-bottom:none; }
  .tap-card:hover { background:#FBF7EC; }
  .tap-card .tc-left { display:flex; align-items:center; gap:12px; }
  .tap-card .tc-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .tap-card .tc-title { font-weight:600; font-size:14px; }
  .tap-card .tc-sub { font-size:11.5px; color:var(--muted); margin-top:1px; }
  .tap-card .chev { color:var(--muted); font-size:16px; }

  .btn { border:none; border-radius:12px; padding:13px; font-size:14.5px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-primary { background:var(--teal); color:#fff; width:100%; margin-top:18px; }
  .btn-primary:hover { background:#1f4650; }
  .btn-ghost { background:var(--paper); border:1px solid var(--line); color:var(--ink); }
  .btn-sm { padding:8px 14px; font-size:12.5px; border-radius:9px; }
  .save-confirm { text-align:center; font-size:12px; color:var(--teal); margin-top:9px; height:14px; }

  select.field-select, input.text-input { font-family:'Inter',sans-serif; font-size:13.5px; border:1px solid var(--line); border-radius:8px; padding:8px 10px; background:#FCFAF5; color:var(--ink); width:100%; }

  .receipt { background:var(--paper); border:1px solid var(--line); border-radius:4px; box-shadow:var(--shadow); padding:18px 20px 15px; font-family:'IBM Plex Mono',monospace; position:relative; margin-bottom:22px; }
  .receipt::after { content:""; position:absolute; left:0; right:0; bottom:-9px; height:18px; background:radial-gradient(circle at 9px 0, transparent 9px, var(--bg) 9.5px) repeat-x; background-size:18px 18px; }
  .receipt-title { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:11px; }
  .receipt-line { display:flex; justify-content:space-between; font-size:13.5px; padding:3px 0; }
  .receipt-line.muted { color:var(--muted); font-size:11.5px; }
  .receipt-divider { border:none; border-top:1px dashed var(--line); margin:7px 0; }
  .receipt-total { font-size:16px; font-weight:700; }
  .receipt-total .val.pos { color:var(--teal); }
  .receipt-total .val.neg { color:var(--red); }

  .date-row { display:flex; align-items:center; gap:10px; margin:8px 0 16px; }
  .date-row button.nav-arrow { width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:var(--paper); cursor:pointer; color:var(--muted); font-size:16px; }
  .date-row button.nav-arrow:hover { background:var(--teal-dim); color:var(--ink); }
  .date-label-wrap { flex:1; position:relative; }
  .date-label { font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700; text-transform:capitalize; cursor:pointer; }
  .date-sub { font-size:11.5px; color:var(--muted); }
  .date-input-hidden { position:absolute; inset:0; opacity:0; cursor:pointer; }

  .attend-grid { display:flex; flex-wrap:wrap; gap:8px; padding:13px 14px; }
  .attend-chip { display:flex; align-items:center; gap:7px; padding:9px 13px; border-radius:20px; border:1px solid var(--line); background:#FCFAF5; cursor:pointer; font-size:13px; }
  .attend-chip .mark { width:14px; height:14px; border-radius:50%; border:1.5px solid var(--muted); display:flex; align-items:center; justify-content:center; font-size:9px; color:transparent; }
  .attend-chip.on { background:var(--amber-dim); border-color:var(--amber); color:#7a3f13; }
  .attend-chip.on .mark { background:var(--amber); border-color:var(--amber); color:#fff; }

  nav.tabbar { position:fixed; left:0; right:0; bottom:0; background:rgba(250,247,241,0.94); backdrop-filter:blur(10px); border-top:1px solid var(--line); display:flex; justify-content:center; z-index:20; }
  .tabbar-inner { max-width:600px; width:100%; display:flex; }
  .tab-btn { flex:1; border:none; background:none; cursor:pointer; padding:9px 2px 11px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:9.8px; font-weight:600; }
  .tab-btn.active { color:var(--teal); }
  .tab-btn svg { width:19px; height:19px; }

  .kpi-row { display:flex; gap:9px; margin-bottom:9px; }
  .kpi { flex:1; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:13px 13px; }
  .kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  .kpi-val { font-family:'IBM Plex Mono',monospace; font-size:17px; font-weight:600; margin-top:3px; }
  .kpi-val.pos { color:var(--teal); }
  .kpi-val.neg { color:var(--red); }

  .chart-card { background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:16px 14px 8px; }
  .bars { display:flex; align-items:flex-end; gap:5px; height:120px; margin-top:4px; }
  .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:2px; }
  .bar-pair { display:flex; align-items:flex-end; gap:2px; height:100%; width:100%; justify-content:center; }
  .bar { width:40%; border-radius:3px 3px 0 0; min-height:2px; }
  .bar.rev { background:var(--teal); }
  .bar.exp { background:var(--red); opacity:.75; }
  .bar-m-label { font-size:9px; color:var(--muted); margin-top:5px; }
  .legend { display:flex; gap:14px; justify-content:center; margin-top:10px; font-size:11px; color:var(--muted); }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .legend i { width:8px; height:8px; border-radius:2px; display:inline-block; }

  .empty-state { text-align:center; color:var(--muted); font-size:13px; padding:50px 20px; }
  .empty-state .big { font-size:32px; display:block; margin-bottom:9px; }

  .add-row { display:flex; gap:8px; padding:13px 14px; flex-wrap:wrap; }
  .add-row input, .add-row select { flex:1; min-width:110px; }
  .add-row button { background:var(--ink); color:#fff; border:none; border-radius:8px; padding:0 15px; font-size:12.5px; font-weight:600; cursor:pointer; }

  .emp-card { display:flex; align-items:center; justify-content:space-between; padding:13px 14px; border-bottom:1px solid var(--line); }
  .emp-card:last-child { border-bottom:none; }
  .emp-remove { color:var(--red); background:none; border:none; cursor:pointer; font-size:18px; padding:4px 6px; }
  .mini-input { width:66px; text-align:right; font-family:'IBM Plex Mono',monospace; border:1px solid var(--line); border-radius:6px; padding:4px 6px; font-size:12px; background:#FCFAF5; }

  .day-row { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
  .day-row:last-child { border-bottom:none; }
  .day-row:hover { background:#FBF7EC; }
  .day-left { font-size:13px; font-weight:500; }
  .day-left .dow { color:var(--muted); font-weight:400; text-transform:capitalize; }
  .day-nums { display:flex; gap:12px; font-family:'IBM Plex Mono',monospace; font-size:12px; }
  .move-remove { color: var(--red); background:none; border:none; cursor:pointer; font-size:16px; padding:2px 6px; }

  .backdrop { position:fixed; inset:0; background:rgba(36,31,26,0.35); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  .sheet { background:var(--bg); width:100%; max-width:600px; border-radius:20px 20px 0 0; max-height:88vh; overflow-y:auto; padding:18px 18px 28px; }
  .sheet-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .sheet-head h2 { font-family:'Space Grotesk',sans-serif; font-size:17px; margin:0; }

  .tax-note { font-size:11px; color:var(--muted); font-style:italic; line-height:1.5; padding:10px 2px; }
  .flag-box { padding:13px 14px; border-radius:12px; font-weight:600; font-size:13px; margin-top:6px; }
  .flag-ok { background:var(--teal-dim); color:var(--teal); }
  .flag-warn { background:var(--red-dim); color:var(--red); }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  /* ---------------- storage shim (works in Claude artifacts + standalone) ---------------- */
  if (!window.storage) {
    window.storage = {
      async get(key, shared){ const k=(shared?'shared:':'priv:')+key; const v=localStorage.getItem(k); if(v===null) throw new Error('not found'); return {key,value:v,shared:!!shared}; },
      async set(key, value, shared){ const k=(shared?'shared:':'priv:')+key; localStorage.setItem(k,value); return {key,value,shared:!!shared}; },
      async delete(key, shared){ const k=(shared?'shared:':'priv:')+key; localStorage.removeItem(k); return {key,deleted:true,shared:!!shared}; },
      async list(prefix, shared){ const ns=shared?'shared:':'priv:'; const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k.indexOf(ns)===0){ const kk=k.slice(ns.length); if(!prefix||kk.indexOf(prefix)===0) keys.push(kk); } } return {keys,prefix,shared:!!shared}; }
    };
  }
  async function sGet(key){ try{ const r=await window.storage.get(key,false); return r?JSON.parse(r.value):null; }catch(e){ return null; } }
  async function sSet(key,val){ try{ await window.storage.set(key, JSON.stringify(val), false); }catch(e){ console.error('storage set failed',e); } }

  const DOW = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function monthKeyOf(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1); }
  function fmtMoney(n){ n=Number(n)||0; return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
  function fmtMoneySigned(n){ const s=fmtMoney(Math.abs(n)); return (n<0?'−':'')+s; }
  function fmtPct(n){ return (Number(n)*100).toLocaleString('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:1})+' %'; }
  function uid(prefix){ return prefix+Date.now()+Math.floor(Math.random()*1000); }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  /* ---------------- default settings ---------------- */
  const DEFAULT_SETTINGS = {
    companyName: "Good'Asie",
    revenueSources: [{id:'r1',name:'Espèces'},{id:'r2',name:'Belle Vue'},{id:'r3',name:'Maison Rouge'},{id:'r4',name:'TOOGO'}],
    expenseCategories: [
      {id:'c1',name:'Loyer',vatRate:0},
      {id:'c2',name:'Eau et Électricité',vatRate:0.20},
      {id:'c3',name:'Comptabilité',vatRate:0.20},
      {id:'c4',name:'Frais de gestion',vatRate:0},
      {id:'c5',name:'Frais de stand',vatRate:0.20},
      {id:'c6',name:'Transport',vatRate:0},
      {id:'c7',name:'Rénovation et Équipement',vatRate:0.20},
      {id:'c8',name:'Achats',vatRate:0.055},
      {id:'c9',name:'Autres dépenses',vatRate:0}
    ],
    employees: [{id:'e1',name:'李姐',rate:70},{id:'e2',name:'小孩儿',rate:90},{id:'e3',name:'郑姐',rate:70}],
    suppliers: [{id:'s1',name:'LX'},{id:'s2',name:'XH'},{id:'s3',name:'KD'},{id:'s4',name:'TANG'}],
    products: [],
    tax: { tvaCollectee:0.10, isSeuil:42500, isTauxReduit:0.15, isTauxNormal:0.25, cvaeSeuil:152500, cfeAnnuelle:0 }
  };

  const state = {
    tab:'today', stockView:'landing', stockLogSupplier:null, stockLogDirection:null,
    selectedDate:new Date(), settings:null, monthCache:{}, stockCache:{},
    bilanYear:new Date().getFullYear(), teamMonth:monthKeyOf(new Date()),
    historyMonthsShown:6, taxYear:new Date().getFullYear()
  };

  async function loadSettings(){
    let s = await sGet('settings');
    if(!s){ s=DEFAULT_SETTINGS; await sSet('settings',s); }
    s.revenueSources = s.revenueSources || DEFAULT_SETTINGS.revenueSources;
    s.expenseCategories = s.expenseCategories || DEFAULT_SETTINGS.expenseCategories;
    s.employees = s.employees || DEFAULT_SETTINGS.employees;
    s.suppliers = s.suppliers || DEFAULT_SETTINGS.suppliers;
    s.companyName = s.companyName || DEFAULT_SETTINGS.companyName;
    s.products = s.products || [];
    s.tax = s.tax || DEFAULT_SETTINGS.tax;
    state.settings = s;
  }
  async function saveSettings(){ await sSet('settings', state.settings); }

  async function getMonth(mk){
    if(state.monthCache[mk]) return state.monthCache[mk];
    let m = await sGet('month:'+mk);
    if(!m) m = { days:{} };
    state.monthCache[mk] = m;
    return m;
  }
  async function saveMonth(mk){ await sSet('month:'+mk, state.monthCache[mk]); }

  function emptyDay(){ return { revenue:{}, expenses:{}, attendance:[] }; }
  function dayTotals(day, settings){
    let rev=0; (settings.revenueSources||[]).forEach(s=>rev+=Number(day.revenue[s.id]||0));
    let exp=0; (settings.expenseCategories||[]).forEach(c=>exp+=Number(day.expenses[c.id]||0));
    let sal=0; (day.attendance||[]).forEach(a=>sal+=Number(a.rate||0));
    return { rev, exp:exp+sal, sal, expNoSal:exp };
  }

  async function getStock(supplierId, mk){
    const key = supplierId+':'+mk;
    if(state.stockCache[key]) return state.stockCache[key];
    let m = await sGet('stock:'+key);
    if(!m) m = { entree:[], sortie:[] };
    state.stockCache[key] = m;
    return m;
  }
  async function saveStock(supplierId, mk){ await sSet('stock:'+supplierId+':'+mk, state.stockCache[supplierId+':'+mk]); }

  // load ALL stock movements across all months for a supplier (for aggregation)
  async function getAllStockForSupplier(supplierId){
    const list = await window.storage.list('stock:'+supplierId+':', false).catch(()=>({keys:[]}));
    const keys = (list && list.keys) || [];
    const out = { entree:[], sortie:[] };
    for(const k of keys){
      const mk = k.split(':').pop();
      const m = await getStock(supplierId, mk);
      out.entree.push(...m.entree.map(x=>({...x, mk})));
      out.sortie.push(...m.sortie.map(x=>({...x, mk})));
    }
    return out;
  }

  async function computeStockSummary(){
    const settings = state.settings;
    const perProduct = {};
    settings.products.forEach(p=>{ perProduct[p.id] = { product:p, entree:0, sortie:0 }; });
    for(const sup of settings.suppliers){
      const all = await getAllStockForSupplier(sup.id);
      all.entree.forEach(m=>{ if(perProduct[m.productId]) perProduct[m.productId].entree += Number(m.qty||0); });
      all.sortie.forEach(m=>{ if(perProduct[m.productId]) perProduct[m.productId].sortie += Number(m.qty||0); });
    }
    let totalValue = 0;
    const rows = Object.values(perProduct).map(x=>{
      const stock = x.entree - x.sortie;
      const value = stock * Number(x.product.unitPrice||0);
      totalValue += value;
      return { ...x, stock, value };
    });
    return { rows, totalValue };
  }

  /* ---------------- shell ---------------- */
  const app = document.getElementById('app');
  function iconSvg(name){
    const icons = {
      today: '<path d="M7 3v3M17 3v3M4 9h16M5 6h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
      stock: '<path d="M3 7l9-4 9 4-9 4-9-4Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M3 7v10l9 4 9-4V7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><path d="M12 11v10" stroke="currentColor" stroke-width="1.5" fill="none"/>',
      team: '<circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/><circle cx="17" cy="7" r="2.4" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M15.5 14.2c2.9.4 5 2.7 5 5.8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>',

    return icons[name]||'';
  }
  function tabBtn(id,label){ return `<button class="tab-btn ${state.tab===id?'active':''}" data-tab="${id}"><svg viewBox="0 0 24 24">${iconSvg(id)}</svg>${label}</button>`; }

  async function render(){
    if(!state.settings) await loadSettings();
    let body='';
    if(state.tab==='today') body = await renderToday();
    else if(state.tab==='stock') body = await renderStock();
    else if(state.tab==='team') body = await renderTeam();
    else if(state.tab==='bilan') body = await renderBilan();
    else if(state.tab==='fiscal') body = await renderFiscal();

    app.innerHTML = `
      <div class="topbar">
        <div class="brand">${escapeHtml(state.settings.companyName)}<span class="sub">Gestion interne</span></div>
        <button class="icon-btn" id="settingsBtn" aria-label="Réglages"><svg viewBox="0 0 24 24">${iconSvg('gear')}</svg></button>
      </div>
      <main>${body}</main>
      <nav class="tabbar"><div class="tabbar-inner">
        ${tabBtn('today',"Aujourd'hui")}
        ${tabBtn('stock','Stock')}
        ${tabBtn('team','Équipe')}
        ${tabBtn('bilan','Bilan')}
        ${tabBtn('fiscal','Fiscal')}
      </div></nav>`;
    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
      state.tab=b.dataset.tab;
      if(state.tab==='stock'){ state.stockView='landing'; }
      render();
    }));
    document.getElementById('settingsBtn').addEventListener('click', openSettings);

    if(state.tab==='today') bindToday();
    if(state.tab==='stock') bindStock();
    if(state.tab==='team') bindTeam();
    if(state.tab==='bilan') bindBilan();
    if(state.tab==='fiscal') bindFiscal();
  }

  /* ================= AUJOURD'HUI ================= */
  async function renderToday(){
    const d = state.selectedDate;
    const mk = monthKeyOf(d);
    const month = await getMonth(mk);
    const dk = String(d.getDate());
    const day = month.days[dk] ? JSON.parse(JSON.stringify(month.days[dk])) : emptyDay();
    state._todayDay = day;
    const t = dayTotals(day, state.settings);
    const isToday = dateKey(d)===dateKey(new Date());

    const revRows = state.settings.revenueSources.map(s=>{
      const cur = Number(day.revenue[s.id]||0);
      return `
      <div class="field-row acc-row" style="position:relative;">
        <div class="field-label-wrap"><span class="field-label">${escapeHtml(s.name)}</span>
          <span class="field-current fixable ${cur>0?'has-val':''}" data-kind="revenue" data-key="${s.id}" data-cur="${cur}">${cur>0?'déjà : '+fmtMoney(cur)+' ✎':'rien pour l’instant'}</span>
        </div>
        <div class="field-input-wrap">
          <input class="field-input acc-input" type="number" inputmode="decimal" step="0.01" data-kind="revenue" data-key="${s.id}" placeholder="+ montant">
          <button class="acc-add-btn" data-kind="revenue" data-key="${s.id}" aria-label="Ajouter">+</button>
        </div>
        <span class="acc-flash" data-flash-kind="revenue" data-flash-key="${s.id}"></span>
      </div>`;
    }).join('');
    const expRows = state.settings.expenseCategories.map(c=>{
      const cur = Number(day.expenses[c.id]||0);
      return `
      <div class="field-row acc-row" style="position:relative;">
        <div class="field-label-wrap"><span class="field-label">${escapeHtml(c.name)}</span>
          <span class="field-current fixable ${cur>0?'has-val':''}" data-kind="expense" data-key="${c.id}" data-cur="${cur}">${cur>0?'déjà : '+fmtMoney(cur)+' ✎':'rien pour l’instant'}</span>
        </div>
        <div class="field-input-wrap">
          <input class="field-input acc-input" type="number" inputmode="decimal" step="0.01" data-kind="expense" data-key="${c.id}" placeholder="+ montant">
          <button class="acc-add-btn" data-kind="expense" data-key="${c.id}" aria-label="Ajouter">+</button>
        </div>
        <span class="acc-flash" data-flash-kind="expense" data-flash-key="${c.id}"></span>
      </div>`;
    }).join('');
    const attendChips = state.settings.employees.map(e=>{
      const present = day.attendance.some(a=>a.id===e.id);
      return `<div class="attend-chip ${present?'on':''}" data-emp="${e.id}"><span class="mark">${present?'✓':''}</span>${escapeHtml(e.name)}</div>`;
    }).join('');

    return `
      <div class="date-row">
        <button class="nav-arrow" id="prevDay">‹</button>
        <div class="date-label-wrap">
          <div class="date-label">${DOW[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
          <div class="date-sub">${isToday?"C'est aujourd'hui":'Modifier ce jour'}</div>
          <input class="date-input-hidden" type="date" id="datePick" value="${dateKey(d)}">
        </div>
        <button class="nav-arrow" id="nextDay">›</button>
      </div>
      <div class="receipt">
        <div class="receipt-title">Récapitulatif du jour</div>
        <div class="receipt-line"><span>Revenu total</span><span>${fmtMoney(t.rev)}</span></div>
        <div class="receipt-line muted"><span>Dépenses (hors salaires)</span><span>${fmtMoney(t.expNoSal)}</span></div>
        <div class="receipt-line muted"><span>Salaires du jour</span><span>${fmtMoney(t.sal)}</span></div>
        <hr class="receipt-divider">
        <div class="receipt-line receipt-total"><span>Solde</span><span class="val ${t.rev-t.exp>=0?'pos':'neg'}">${fmtMoneySigned(t.rev-t.exp)}</span></div>
      </div>
      <div class="section-title"><span class="swatch" style="background:var(--teal)"></span>Revenus</div>
      <div class="card">${revRows}</div>
      <div class="section-title"><span class="swatch" style="background:var(--red)"></span>Dépenses</div>
      <div class="card">${expRows}</div>
      <div class="section-title"><span class="swatch" style="background:var(--amber)"></span>Présence équipe</div>
      <div class="card"><div class="attend-grid">${attendChips||'<span style="color:var(--muted);font-size:13px;padding:6px 0;">Ajoutez des employés dans Équipe</span>'}</div></div>
      <div class="auto-save-note"><span class="dot"></span>Chaque ajout est enregistré automatiquement</div>
    `;
  }
  function bindToday(){
    document.getElementById('prevDay').addEventListener('click',()=>{ state.selectedDate=new Date(state.selectedDate.getTime()-86400000); render(); });
    document.getElementById('nextDay').addEventListener('click',()=>{ state.selectedDate=new Date(state.selectedDate.getTime()+86400000); render(); });
    document.getElementById('datePick').addEventListener('change',e=>{ if(e.target.value){ const [y,m,dd]=e.target.value.split('-').map(Number); state.selectedDate=new Date(y,m-1,dd); render(); } });

    async function commitAdd(kind, key, inputEl){
      const raw = inputEl.value;
      const amount = Number(raw);
      if(!raw || isNaN(amount) || amount===0){
        inputEl.style.borderColor = 'var(--red)';
        setTimeout(()=>{ inputEl.style.borderColor=''; }, 900);
        return;
      }
      const d = state.selectedDate, mk = monthKeyOf(d), dk = String(d.getDate());
      const month = await getMonth(mk);
      if(!month.days[dk]) month.days[dk] = emptyDay();
      const day = month.days[dk];
      const bucket = kind==='revenue' ? day.revenue : day.expenses;
      bucket[key] = Number(bucket[key]||0) + amount;
      await saveMonth(mk);
      state._todayDay = JSON.parse(JSON.stringify(day));

      inputEl.value = '';
      const row = inputEl.closest('.acc-row');
      const curLabel = row.querySelector('.field-current');
      const newVal = bucket[key];
      curLabel.textContent = newVal>0 ? 'déjà : '+fmtMoney(newVal)+' ✎' : 'rien pour l’instant';
      curLabel.classList.toggle('has-val', newVal>0);
      curLabel.dataset.cur = newVal;
      const flash = row.querySelector('.acc-flash');
      flash.textContent = (amount>0?'+':'')+fmtMoney(amount).replace('−','-');
      flash.classList.add('show');
      setTimeout(()=>{ flash.classList.remove('show'); }, 1100);
      updateReceiptLive();
    }

    document.querySelectorAll('.acc-add-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const row = btn.closest('.acc-row');
        const input = row.querySelector('.acc-input');
        commitAdd(btn.dataset.kind, btn.dataset.key, input);
      });
    });
    document.querySelectorAll('.acc-input').forEach(inp=>{
      inp.addEventListener('keydown', e=>{
        if(e.key==='Enter'){
          e.preventDefault();
          commitAdd(inp.dataset.kind, inp.dataset.key, inp);
        }
      });
    });
    document.querySelectorAll('.attend-chip').forEach(chip=>{
      chip.addEventListener('click', async ()=>{
        const empId=chip.dataset.emp; const emp=state.settings.employees.find(e=>e.id===empId);
        const d=state.selectedDate, mk=monthKeyOf(d), dk=String(d.getDate());
        const month = await getMonth(mk);
        if(!month.days[dk]) month.days[dk] = emptyDay();
        const day = month.days[dk];
        const idx = day.attendance.findIndex(a=>a.id===empId);
        if(idx>=0) day.attendance.splice(idx,1); else day.attendance.push({id:emp.id,name:emp.name,rate:emp.rate});
        await saveMonth(mk);
        state._todayDay = JSON.parse(JSON.stringify(day));
        chip.classList.toggle('on'); chip.querySelector('.mark').textContent = chip.classList.contains('on')?'✓':'';
        updateReceiptLive();
      });
    });

    document.querySelectorAll('.field-current.fixable').forEach(label=>{
      label.addEventListener('click', ()=>{
        if(label.querySelector('.fix-edit-wrap')) return; // already editing
        const kind = label.dataset.kind, key = label.dataset.key;
        const curVal = Number(label.dataset.cur||0);
        const originalHTML = label.innerHTML;
        label.classList.remove('fixable');
        label.innerHTML = `<span class="fix-edit-wrap">
          <input class="fix-edit-input" type="number" step="0.01" value="${curVal}">
          <button class="fix-edit-btn">OK</button>
          <button class="fix-cancel-btn">annuler</button>
        </span>`;
        const input = label.querySelector('.fix-edit-input');
        input.focus(); input.select();
        function cancel(){ label.classList.add('fixable'); label.innerHTML = originalHTML; }
        label.querySelector('.fix-cancel-btn').addEventListener('click', e=>{ e.stopPropagation(); cancel(); });
        label.querySelector('.fix-edit-btn').addEventListener('click', async e=>{
          e.stopPropagation();
          const newVal = Number(input.value);
          if(isNaN(newVal) || newVal<0){ cancel(); return; }
          const d = state.selectedDate, mk = monthKeyOf(d), dk = String(d.getDate());
          const month = await getMonth(mk);
          if(!month.days[dk]) month.days[dk] = emptyDay();
          const day = month.days[dk];
          const bucket = kind==='revenue' ? day.revenue : day.expenses;
          bucket[key] = newVal;
          await saveMonth(mk);
          state._todayDay = JSON.parse(JSON.stringify(day));
          render();
        });
        input.addEventListener('keydown', e=>{
          if(e.key==='Enter'){ e.preventDefault(); label.querySelector('.fix-edit-btn').click(); }
          if(e.key==='Escape'){ e.preventDefault(); cancel(); }
        });
        input.addEventListener('click', e=>e.stopPropagation());
      });
    });
  }
  function updateReceiptLive(){
    const t = dayTotals(state._todayDay, state.settings);
    const lines = document.querySelectorAll('.receipt-line');
    lines[0].querySelector('span:last-child').textContent = fmtMoney(t.rev);
    lines[1].querySelector('span:last-child').textContent = fmtMoney(t.expNoSal);
    lines[2].querySelector('span:last-child').textContent = fmtMoney(t.sal);
    const totalEl = document.querySelector('.receipt-total .val');
    totalEl.textContent = fmtMoneySigned(t.rev-t.exp);
    totalEl.className = 'val '+(t.rev-t.exp>=0?'pos':'neg');
  }

  /* ================= STOCK ================= */
  async function renderStock(){
    if(state.stockView==='landing') return renderStockLanding();
    if(state.stockView==='vue') return renderStockVue();
    if(state.stockView==='log') return renderStockLog();
    return '';
  }
  async function renderStockLanding(){
    const summary = await computeStockSummary();
    let html = `<h1 class="page-title">📦 Stock</h1>`;
    html += `<div class="card" style="margin-bottom:18px;">
      <div class="tap-card" id="goVue">
        <div class="tc-left"><div class="tc-icon" style="background:var(--teal-dim);color:var(--teal);">${svgWrap('list')}</div>
          <div><div class="tc-title">Vue générale</div><div class="tc-sub">${summary.rows.length} produits · valeur totale ${fmtMoney(summary.totalValue)}</div></div>
        </div><span class="chev">›</span>
      </div>
    </div>`;
    state.settings.suppliers.forEach(sup=>{
      html += `<div class="section-title"><span class="swatch" style="background:var(--amber)"></span>${escapeHtml(sup.name)}</div>
      <div class="card">
        <div class="tap-card" data-sup="${sup.id}" data-dir="entree">
          <div class="tc-left"><div class="tc-icon" style="background:var(--teal-dim);color:var(--teal);">${svgWrap('in')}</div>
            <div><div class="tc-title">${escapeHtml(sup.name)} · Entrée</div><div class="tc-sub">Réceptions de marchandises</div></div>
          </div><span class="chev">›</span>
        </div>
        <div class="tap-card" data-sup="${sup.id}" data-dir="sortie">
          <div class="tc-left"><div class="tc-icon" style="background:var(--red-dim);color:var(--red);">${svgWrap('out')}</div>
            <div><div class="tc-title">${escapeHtml(sup.name)} · Sortie</div><div class="tc-sub">Marchandises utilisées / vendues</div></div>
          </div><span class="chev">›</span>
        </div>
      </div>`;
    });
    return html;
  }
  function svgWrap(name){ return `<svg viewBox="0 0 24 24" width="18" height="18">${iconSvg(name)}</svg>`; }

  async function renderStockVue(){
    const summary = await computeStockSummary();
    let html = `<div class="crumb"><button id="backToLanding">‹ Stock</button><span class="sep">/</span><span class="current">Vue générale</span></div>`;
    if(summary.rows.length===0){
      html += `<div class="empty-state"><span class="big">📭</span>Aucun produit pour l'instant.<br>Ajoutez des produits depuis un écran Entrée/Sortie.</div>`;
    } else {
      const bySupplier = {};
      summary.rows.forEach(r=>{
        const sid = r.product.supplierId;
        (bySupplier[sid] = bySupplier[sid]||[]).push(r);
      });
      state.settings.suppliers.forEach(sup=>{
        const rows = bySupplier[sup.id]||[];
        if(rows.length===0) return;
        html += `<div class="section-title"><span class="swatch" style="background:var(--amber)"></span>${escapeHtml(sup.name)}</div><div class="card">`;
        rows.forEach(r=>{
          html += `<div class="field-row" style="flex-wrap:wrap;">
            <div style="flex:1;min-width:120px;">
              <div style="font-weight:600;font-size:13.5px;">${escapeHtml(r.product.name)}</div>
              <div style="font-size:11px;color:var(--muted);">Entrée ${r.entree} · Sortie ${r.sortie} · Stock <b>${r.stock}</b></div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <input class="mini-input" type="number" step="0.01" data-price="${r.product.id}" value="${r.product.unitPrice||0}"> €
              <span style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;min-width:70px;text-align:right;">${fmtMoney(r.value)}</span>
            </div>
          </div>`;
        });
        html += `</div>`;
      });
      html += `<div class="receipt" style="margin-top:20px;">
        <div class="receipt-title">Valeur totale du stock</div>
        <div class="receipt-line receipt-total"><span>Total</span><span class="val pos">${fmtMoney(summary.totalValue)}</span></div>
      </div>`;
    }
    return html;
  }

  async function renderStockLog(){
    const sup = state.settings.suppliers.find(s=>s.id===state.stockLogSupplier);
    const dir = state.stockLogDirection;
    const dirLabel = dir==='entree' ? 'Entrée' : 'Sortie';
    const d = state.selectedDate;
    const mk = monthKeyOf(d);
    const stockMonth = await getStock(sup.id, mk);
    const products = state.settings.products.filter(p=>p.supplierId===sup.id);

    let html = `<div class="crumb"><button id="backToLanding">‹ Stock</button><span class="sep">/</span><span class="current">${escapeHtml(sup.name)} · ${dirLabel}</span></div>`;

    const productOptions = products.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
    html += `
      <div class="section-title"><span class="swatch" style="background:${dir==='entree'?'var(--teal)':'var(--red)'}"></span>Nouvelle ligne</div>
      <div class="card">
        <div class="field-row"><span class="field-label">Date</span>
          <div class="date-label-wrap" style="flex:0 0 auto;position:relative;">
            <span id="logDateLabel" style="font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;">${dateKey(d)}</span>
            <input class="date-input-hidden" type="date" id="logDatePick" value="${dateKey(d)}">
          </div>
        </div>
        <div class="field-row" style="flex-direction:column;align-items:stretch;gap:8px;">
          <span class="field-label">Produit</span>
          <select class="field-select" id="logProduct">
            <option value="">— Choisir —</option>
            ${productOptions}
            <option value="__new__">+ Nouveau produit…</option>
          </select>
          <input class="text-input" id="newProductName" placeholder="Nom du nouveau produit" style="display:none;">
        </div>
        <div class="field-row"><span class="field-label">Quantité</span>
          <div class="field-input-wrap"><input class="field-input" type="number" step="1" id="logQty" placeholder="0"></div>
        </div>
      </div>
      <button class="btn btn-primary" id="addMoveBtn">Ajouter la ligne</button>
      <div class="save-confirm" id="logConfirm"></div>
    `;

    const moves = stockMonth[dir].slice().sort((a,b)=>b.day-a.day);
    html += `<div class="section-title"><span class="swatch" style="background:var(--ink)"></span>${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>`;
    if(moves.length===0){
      html += `<div class="empty-state" style="padding:30px 20px;"><span class="big">📝</span>Aucune ligne ce mois-ci.</div>`;
    } else {
      html += `<div class="card">`;
      moves.forEach((m,i)=>{
        const p = state.settings.products.find(pp=>pp.id===m.productId);
        html += `<div class="day-row" data-moveidx="${stockMonth[dir].indexOf(m)}">
          <div class="day-left">${pad(m.day)} <span class="dow">${MONTHS[d.getMonth()].slice(0,3)}</span> — ${escapeHtml(p?p.name:'?')}</div>
          <div class="day-nums"><span>${m.qty}</span><button class="move-remove" data-rm="${stockMonth[dir].indexOf(m)}">×</button></div>
        </div>`;
      });
      html += `</div>`;
    }
    return html;
  }

  function bindStock(){
    if(state.stockView==='landing'){
      document.getElementById('goVue').addEventListener('click',()=>{ state.stockView='vue'; render(); });
      document.querySelectorAll('.tap-card[data-sup]').forEach(el=>{
        el.addEventListener('click',()=>{
          state.stockLogSupplier = el.dataset.sup;
          state.stockLogDirection = el.dataset.dir;
          state.stockView='log';
          render();
        });
      });
    } else if(state.stockView==='vue'){
      document.getElementById('backToLanding').addEventListener('click',()=>{ state.stockView='landing'; render(); });
      document.querySelectorAll('[data-price]').forEach(inp=>{
        inp.addEventListener('change', async ()=>{
          const p = state.settings.products.find(pp=>pp.id===inp.dataset.price);
          if(p){ p.unitPrice = Number(inp.value)||0; await saveSettings(); render(); }
        });
      });
    } else if(state.stockView==='log'){
      document.getElementById('backToLanding').addEventListener('click',()=>{ state.stockView='landing'; render(); });
      const dateLabel = document.getElementById('logDateLabel');
      const datePick = document.getElementById('logDatePick');
      dateLabel.addEventListener('click', ()=> datePick.showPicker ? datePick.showPicker() : datePick.focus());
      datePick.addEventListener('change', e=>{
        if(e.target.value){ const [y,m,dd]=e.target.value.split('-').map(Number); state.selectedDate=new Date(y,m-1,dd); render(); }
      });
      const prodSel = document.getElementById('logProduct');
      const newProdInput = document.getElementById('newProductName');
      prodSel.addEventListener('change', ()=>{ newProdInput.style.display = prodSel.value==='__new__' ? 'block' : 'none'; });

      document.getElementById('addMoveBtn').addEventListener('click', async ()=>{
        const sup = state.settings.suppliers.find(s=>s.id===state.stockLogSupplier);
        const dir = state.stockLogDirection;
        let productId = prodSel.value;
        const qty = Number(document.getElementById('logQty').value);
        if(!productId){ flashLogConfirm('Choisissez un produit', true); return; }
        if(!qty || qty<=0){ flashLogConfirm('Entrez une quantité valide', true); return; }
        if(productId==='__new__'){
          const name = newProdInput.value.trim();
          if(!name){ flashLogConfirm('Entrez le nom du produit', true); return; }
          productId = uid('p');
          state.settings.products.push({id:productId, name, supplierId:sup.id, unitPrice:0});
          await saveSettings();
        }
        const d = state.selectedDate;
        const mk = monthKeyOf(d);
        const m = await getStock(sup.id, mk);
        m[dir].push({ day: d.getDate(), productId, qty });
        await saveStock(sup.id, mk);
        flashLogConfirm('✓ Ligne ajoutée', false);
        render();
      });

      document.querySelectorAll('[data-rm]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const sup = state.settings.suppliers.find(s=>s.id===state.stockLogSupplier);
          const dir = state.stockLogDirection;
          const d = state.selectedDate; const mk = monthKeyOf(d);
          const m = await getStock(sup.id, mk);
          m[dir].splice(Number(btn.dataset.rm),1);
          await saveStock(sup.id, mk);
          render();
        });
      });
    }
  }

  /* ================= BILAN ================= */
  async function annualTotals(year){
    let rev=0, exp=0;
    for(let m=0;m<12;m++){
      const mk=year+'-'+pad(m+1);
      const month = await getMonth(mk);
      Object.values(month.days).forEach(day=>{ const t=dayTotals(day,state.settings); rev+=t.rev; exp+=t.exp; });
    }
    return { rev, exp, solde: rev-exp };
  }

  async function renderBilan(){
    const y = state.bilanYear;
    const monthlyData = [];
    for(let m=0;m<12;m++){
      const mk = y+'-'+pad(m+1);
      const month = await getMonth(mk);
      let rev=0, exp=0;
      Object.values(month.days).forEach(day=>{ const t=dayTotals(day,state.settings); rev+=t.rev; exp+=t.exp; });
      monthlyData.push({m,rev,exp});
    }
    const yearRev = monthlyData.reduce((a,x)=>a+x.rev,0);
    const yearExp = monthlyData.reduce((a,x)=>a+x.exp,0);
    const solde = yearRev-yearExp;
    const marge = yearRev>0 ? solde/yearRev : 0;
    const maxVal = Math.max(1, ...monthlyData.map(x=>Math.max(x.rev,x.exp)));
    const bars = monthlyData.map(x=>{
      const revH=Math.round((x.rev/maxVal)*100), expH=Math.round((x.exp/maxVal)*100);
      return `<div class="bar-col"><div class="bar-pair"><div class="bar rev" style="height:${revH}%"></div><div class="bar exp" style="height:${expH}%"></div></div><div class="bar-m-label">${MONTHS[x.m].slice(0,3)}</div></div>`;
    }).join('');

    const stockSummary = await computeStockSummary();
    const stockValue = stockSummary.totalValue;
    const totalWithStock = solde + stockValue;
    const stockPct = totalWithStock!==0 ? stockValue/totalWithStock : 0;

    return `
      <h1 class="page-title">📊 Bilan</h1>
      <div class="date-row"><button class="nav-arrow" id="yearPrev">‹</button>
        <div style="flex:1;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;">${y}</div>
        <button class="nav-arrow" id="yearNext">›</button>
      </div>
      <div class="kpi-row"><div class="kpi"><div class="kpi-label">Revenu annuel</div><div class="kpi-val pos">${fmtMoney(yearRev)}</div></div>
        <div class="kpi"><div class="kpi-label">Dépenses</div><div class="kpi-val neg">${fmtMoney(yearExp)}</div></div></div>
      <div class="kpi-row"><div class="kpi"><div class="kpi-label">Solde</div><div class="kpi-val ${solde>=0?'pos':'neg'}">${fmtMoneySigned(solde)}</div></div>
        <div class="kpi"><div class="kpi-label">Marge</div><div class="kpi-val ${marge>=0?'pos':'neg'}">${fmtPct(marge)}</div></div></div>

      <div class="section-title"><span class="swatch" style="background:var(--teal)"></span>Revenus vs dépenses par mois</div>
      <div class="chart-card"><div class="bars">${bars}</div>
        <div class="legend"><span><i style="background:var(--teal)"></i>Revenus</span><span><i style="background:var(--red);opacity:.75"></i>Dépenses</span></div>
      </div>

      <div class="section-title"><span class="swatch" style="background:var(--amber)"></span>📦 Stock intégré au bilan</div>
      <div class="tax-note" style="padding:0 2px 8px;">Le stock final est ajouté séparément — le pourcentage indique quelle part du total est du stock non vendu, pas du profit réalisé.</div>
      <div class="receipt" style="margin-top:0;">
        <div class="receipt-line"><span>Bénéfice réel (hors stock)</span><span>${fmtMoney(solde)}</span></div>
        <div class="receipt-line"><span>Valeur totale du stock</span><span>${fmtMoney(stockValue)}</span></div>
        <hr class="receipt-divider">
        <div class="receipt-line receipt-total"><span>Bénéfice total</span><span class="val pos">${fmtMoney(totalWithStock)}</span></div>
        <div class="receipt-line" style="margin-top:6px;"><span>→ Part du stock dans ce total</span><span style="font-weight:700;color:var(--amber);">${fmtPct(stockPct)}</span></div>
      </div>
    `;
  }
  function bindBilan(){
    document.getElementById('yearPrev').addEventListener('click',()=>{ state.bilanYear--; render(); });
    document.getElementById('yearNext').addEventListener('click',()=>{ state.bilanYear++; render(); });
  }

  /* ================= FISCAL ================= */
  async function renderFiscal(){
    const y = state.taxYear;
    const { rev: yearRev, solde } = await annualTotals(y);
    const tax = state.settings.tax;

    // TVA déductible by category
    let totalDed = 0;
    const catRows = [];
    for(const c of state.settings.expenseCategories){
      let annual = 0;
      for(let m=0;m<12;m++){
        const mk=y+'-'+pad(m+1);
        const month = await getMonth(mk);
        Object.values(month.days).forEach(day=>{ annual += Number(day.expenses[c.id]||0); });
      }
      const ded = annual * Number(c.vatRate||0);
      totalDed += ded;
      catRows.push({ cat:c, annual, ded });
    }
    const tvaCollectee = yearRev * Number(tax.tvaCollectee||0);
    const tvaNette = Math.max(tvaCollectee - totalDed, 0);

    const isBase = solde;
    let isEstime = 0;
    if(isBase>0){
      if(isBase<=tax.isSeuil) isEstime = isBase*tax.isTauxReduit;
      else isEstime = tax.isSeuil*tax.isTauxReduit + (isBase-tax.isSeuil)*tax.isTauxNormal;
    }
    const cvaeDue = yearRev > tax.cvaeSeuil;
    const cfe = Number(tax.cfeAnnuelle||0);
    const totalProvisions = tvaNette + isEstime + (cvaeDue?0:0) + cfe; // CVAE flagged separately, not summed numerically when due (needs accountant)
    const couvert = solde >= totalProvisions;

    return `
      <h1 class="page-title">🔔 Suivi fiscal</h1>
      <div class="tax-note" style="padding:0 2px 10px;">Estimation basée sur le cumul de l'année ${y}. À ajuster/valider avec votre comptable — ce n'est pas un calcul officiel.</div>
      <div class="date-row" style="margin-top:0;"><button class="nav-arrow" id="taxYearPrev">‹</button>
        <div style="flex:1;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;">${y}</div>
        <button class="nav-arrow" id="taxYearNext">›</button>
      </div>

      <div class="section-title"><span class="swatch" style="background:var(--teal)"></span>1. TVA déductible par catégorie</div>
      <div class="card">
        ${catRows.map(r=>`<div class="field-row">
          <span class="field-label">${escapeHtml(r.cat.name)} <span style="color:var(--muted);font-size:11px;">(${fmtMoney(r.annual)})</span></span>
          <div class="field-input-wrap"><input class="field-input" style="width:60px;" type="number" step="0.1" data-taxcat="${r.cat.id}" value="${(r.cat.vatRate*100).toFixed(1)}"><span class="field-suffix">%</span></div>
        </div>`).join('')}
      </div>
      <div class="receipt" style="margin-top:12px;"><div class="receipt-line receipt-total"><span>Total TVA déductible</span><span class="val pos">${fmtMoney(totalDed)}</span></div></div>

      <div class="section-title"><span class="swatch" style="background:var(--red)"></span>2. TVA nette à payer</div>
      <div class="card">
        <div class="field-row"><span class="field-label">Taux TVA collectée</span><div class="field-input-wrap"><input class="field-input" style="width:60px;" type="number" step="0.1" id="taxTvaCollectee" value="${(tax.tvaCollectee*100).toFixed(1)}"><span class="field-suffix">%</span></div></div>
        <div class="field-row"><span class="field-label">TVA collectée (CA × taux)</span><span style="font-family:'IBM Plex Mono',monospace;font-size:13px;">${fmtMoney(tvaCollectee)}</span></div>
      </div>
      <div class="receipt" style="margin-top:12px;"><div class="receipt-line receipt-total"><span>TVA nette estimée</span><span class="val neg">${fmtMoney(tvaNette)}</span></div></div>

      <div class="section-title"><span class="swatch" style="background:var(--amber)"></span>3. IS estimé</div>
      <div class="card">
        <div class="field-row"><span class="field-label">Résultat estimé (Solde annuel)</span><span style="font-family:'IBM Plex Mono',monospace;font-size:13px;">${fmtMoney(isBase)}</span></div>
        <div class="field-row"><span class="field-label">Seuil taux réduit</span><div class="field-input-wrap"><input class="field-input" type="number" step="100" id="taxSeuil" value="${tax.isSeuil}"><span class="field-suffix">€</span></div></div>
        <div class="field-row"><span class="field-label">Taux réduit</span><div class="field-input-wrap"><input class="field-input" style="width:60px;" type="number" step="0.1" id="taxTauxReduit" value="${(tax.isTauxReduit*100).toFixed(1)}"><span class="field-suffix">%</span></div></div>
        <div class="field-row"><span class="field-label">Taux normal</span><div class="field-input-wrap"><input class="field-input" style="width:60px;" type="number" step="0.1" id="taxTauxNormal" value="${(tax.isTauxNormal*100).toFixed(1)}"><span class="field-suffix">%</span></div></div>
      </div>
      <div class="receipt" style="margin-top:12px;"><div class="receipt-line receipt-total"><span>IS estimé</span><span class="val neg">${fmtMoney(isEstime)}</span></div></div>

      <div class="section-title"><span class="swatch" style="background:var(--teal)"></span>4. CVAE</div>
      <div class="card">
        <div class="field-row"><span class="field-label">Seuil CVAE (CA)</span><div class="field-input-wrap"><input class="field-input" type="number" step="1000" id="taxCvaeSeuil" value="${tax.cvaeSeuil}"><span class="field-suffix">€</span></div></div>
      </div>
      <div class="${cvaeDue?'flag-box flag-warn':'flag-box flag-ok'}" style="margin-top:10px;">${cvaeDue?'⚠️ CA > seuil — à vérifier avec le comptable':'✅ Pas de CVAE (CA sous le seuil)'}</div>

      <div class="section-title"><span class="swatch" style="background:var(--red)"></span>5. CFE</div>
      <div class="card">
        <div class="field-row"><span class="field-label">CFE estimée (avis N-1)</span><div class="field-input-wrap"><input class="field-input" type="number" step="10" id="taxCfe" value="${tax.cfeAnnuelle}"><span class="field-suffix">€</span></div></div>
      </div>
      <div class="tax-note">Échéance habituelle : mi-décembre.</div>

      <div class="section-title"><span class="swatch" style="background:var(--ink)"></span>6. Total à provisionner</div>
      <div class="receipt" style="margin-top:0;">
        <div class="receipt-line"><span>TVA nette</span><span>${fmtMoney(tvaNette)}</span></div>
        <div class="receipt-line"><span>IS estimé</span><span>${fmtMoney(isEstime)}</span></div>
        <div class="receipt-line"><span>CFE</span><span>${fmtMoney(cfe)}</span></div>
        <hr class="receipt-divider">
        <div class="receipt-line receipt-total"><span>Total provisions</span><span class="val neg">${fmtMoney(totalProvisions)}</span></div>
        <div class="receipt-line" style="margin-top:6px;"><span>Solde cumulé disponible</span><span>${fmtMoney(solde)}</span></div>
      </div>
      <div class="${couvert?'flag-box flag-ok':'flag-box flag-warn'}">${couvert?'✅ Le solde actuel couvre les provisions estimées':'⚠️ Attention : le solde actuel pourrait ne pas suffire'}</div>
    `;
  }
  function bindFiscal(){
    document.getElementById('taxYearPrev').addEventListener('click',()=>{ state.taxYear--; render(); });
    document.getElementById('taxYearNext').addEventListener('click',()=>{ state.taxYear++; render(); });

    document.getElementById('addRevBtn').addEventListener('click', async ()=>{ const inp=document.getElementById('newRevSrc'); const v=inp.value.trim(); if(!v) return; state.settings.revenueSources.push({id:uid('r'),name:v}); await saveSettings(); inp.value=''; renderLists(); });
    document.getElementById('addExpBtn').addEventListener('click', async ()=>{ const inp=document.getElementById('newExpCat'); const v=inp.value.trim(); if(!v) return; state.settings.expenseCategories.push({id:uid('c'),name:v,vatRate:0}); await saveSettings(); inp.value=''; renderLists(); });
    document.getElementById('addSupBtn').addEventListener('click', async ()=>{ const inp=document.getElementById('newSupName'); const v=inp.value.trim(); if(!v) return; state.settings.suppliers.push({id:uid('s'),name:v}); await saveSettings(); inp.value=''; renderLists(); });

    document.getElementById('exportBtn').addEventListener('click', async ()=>{
      const out = { settings: state.settings, months:{}, stock:{} };
      try{
        const list = await window.storage.list('month:', false);
        for(const k of (list.keys||[])){ const r=await window.storage.get(k,false); if(r) out.months[k]=JSON.parse(r.value); }
        const slist = await window.storage.list('stock:', false);
        for(const k of (slist.keys||[])){ const r=await window.storage.get(k,false); if(r) out.stock[k]=JSON.parse(r.value); }
      }catch(e){ console.error(e); }
      const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='good-asie-sauvegarde-'+dateKey(new Date())+'.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    });
  }

  render();
})();
</script>
</body>
</html>
